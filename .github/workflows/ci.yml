name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06
          components: clippy, rustfmt

      - name: Install system deps (Linux — WebKit/GTK for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2


      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: desktop/frontend/node_modules
          key: bun-${{ hashFiles('desktop/frontend/bun.lock') }}
          restore-keys: |
            bun-

      - name: Format check
        run: cargo fmt --check

      - name: Cargo audit (security advisories)
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit || true

      - name: Cargo deny (licenses, duplicates, advisories)
        run: |
          cargo install cargo-deny --locked 2>/dev/null || true
          cargo deny check || true

      - name: Clippy (exclude desktop — needs frontend/dist)
        run: cargo clippy --workspace --exclude desktop -- -D warnings

      - name: Build CLI binary (for e2e tests)
        run: cargo build -p praxis-cli

      - name: Unit tests (exclude desktop — needs frontend/dist)
        run: cargo test --workspace --exclude desktop

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd desktop/frontend
          bun install
          bun run build

      - name: Clippy (desktop only — now that frontend/dist exists)
        run: cargo clippy -p desktop -- -D warnings

      - name: Desktop tests
        run: cargo test -p desktop

      - name: Full workspace build
        run: cargo build --workspace

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: |
          cd desktop/frontend
          bun install

      - name: Install Playwright browsers
        run: |
          cd desktop/frontend
          bunx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd desktop/frontend
          bunx playwright test --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: desktop/frontend/test-results/
          retention-days: 7

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for baseline comparison

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2


      - name: Run benchmarks
        run: cargo bench -p praxis-core --bench loop_throughput -- --output-format bencher | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark_results.txt
          retention-days: 30

      - name: Compare benchmarks and comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let current = null;
            try {
              current = fs.readFileSync('benchmark_results.txt', 'utf8');
            } catch (e) {
              core.info('No benchmark results found');
              return;
            }

            // Parse bencher format: test_bench_name ... bench: N ns/iter (+/- M)
            function parseBenchmarks(text) {
              const results = {};
              for (const line of text.split('\n')) {
                const match = line.match(/test_(\w+)\s+\.\.\s+bench:\s+(\d+)\s+ns\/iter/);
                if (match) {
                  results[match[1]] = parseInt(match[2]);
                }
              }
              return results;
            }

            const results = parseBenchmarks(current);
            if (Object.keys(results).length === 0) {
              core.info('No parseable benchmark results found');
              return;
            }

            let body = '## ⚡ Benchmark Results\n\n';
            body += '| Benchmark | Time (ns/iter) |\n';
            body += '|-----------|---------------|\n';
            for (const [name, ns] of Object.entries(results)) {
              body += `| ${name} | ${ns.toLocaleString()} |\n`;
            }
            body += '\n_Results will be compared against baseline once historical data is available._\n';

            // Find existing bot comment to update, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## ⚡ Benchmark Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

