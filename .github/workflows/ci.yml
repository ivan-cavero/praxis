name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-06
          components: clippy, rustfmt

      - name: Install system deps (Linux — WebKit/GTK for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/*"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: |
            bun-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (exclude desktop — needs dashboard/dist)
        run: cargo clippy --workspace --exclude desktop -- -D warnings

      - name: Build CLI binary (for e2e tests)
        run: cargo build -p praxis-cli

      - name: Unit tests (exclude desktop — needs dashboard/dist)
        run: cargo test --workspace --exclude desktop

      - name: Build dashboard
        run: |
          cd dashboard
          bun install
          bun run build

      - name: Clippy (desktop only — now that dashboard/dist exists)
        run: cargo clippy -p desktop -- -D warnings

      - name: Desktop tests
        run: cargo test -p desktop

      - name: Full workspace build
        run: cargo build --workspace
