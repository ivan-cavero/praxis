# praxis — Docker Compose
#
# Runs the praxis API server (REST + WebSocket on :8080) with a
# persistent data volume. The dashboard is served by the same binary
# at http://localhost:8080 — no separate web container needed.
#
# Usage:
#   docker-compose up -d        # start
#   docker-compose logs -f     # follow logs
#   docker-compose down        # stop

services:
  core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-praxis}/praxis:latest
    ports:
      - "8080:8080"
    volumes:
      - praxis-data:/data
    environment:
      - RUST_LOG=info
      - PRAXIS_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  praxis-data:
